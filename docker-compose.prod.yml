services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minimart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minimart_pw}
      POSTGRES_DB: ${POSTGRES_DB:-minimart}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-14}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-60000}
      CACHE_MAX: ${CACHE_MAX:-200}
      THROTTLE_TTL_SECONDS: ${THROTTLE_TTL_SECONDS:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-1000}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-minimart-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
    ports:
      - "4000:4000"
    depends_on:
      - db
      - redis

volumes:
  pgdata:
